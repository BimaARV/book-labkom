services:
  nginx:
    image: nginx:alpine
    container_name: labkom_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labkom_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labkom_queue
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/usr/local/bin/queue.sh"]
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labkom_scheduler
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/usr/local/bin/scheduler.sh"]
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  mariadb:
    image: mariadb:12
    container_name: labkom_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$$MARIADB_PASSWORD\" mysqladmin ping -h 127.0.0.1 -u \"$$MARIADB_USER\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: labkom_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  storage_data:
  redis_data:
