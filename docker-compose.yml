services:
  nginx:
    image: nginx:alpine
    container_name: labkom_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labkom_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labkom_queue
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/usr/local/bin/queue.sh"]
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labkom_scheduler
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/usr/local/bin/scheduler.sh"]
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network

  mariadb:
    image: mariadb:12
    container_name: labkom_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_DATABASE: ${DB_DATABASE:-laravel}
      MARIADB_USER: ${DB_USERNAME:-root}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  storage_data:
